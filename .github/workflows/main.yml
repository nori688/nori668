name: Arturia Gallery Update

on:
  schedule:
    - cron: '0 * * * *' # Срабатывает каждый час
  workflow_dispatch: # Позволяет запускать вручную кнопкой

jobs:
  update-vibe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run script
        run: python update_vibe.py

      - name: Commit and Push
        run: |
          git config --global user.name 'nori-bot'
          git config --global user.email 'nori-bot@users.noreply.github.com'
          git add arturia_vibe.jpg
          git commit -m "New Arturia vibe! 🗡️" || exit 0
          git push
